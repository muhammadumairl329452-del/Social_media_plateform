<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | Mini Social</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Mini Social</h1>
    <p class="auth-subtitle">Create an account to get started.</p>

    <div class="error-msg" id="error-msg"></div>

    <form id="register-form">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="At least 6 characters" minlength="6" required>
      </div>
      <div class="form-group">
        <label for="reg-confirm-password">Confirm Password</label>
        <input type="password" id="reg-confirm-password" placeholder="Repeat password" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
